# .github/workflows/ci-cd.yml
name: HoYoLAB Daily Check-In

on:
  schedule:
    - cron: "0 19 * * *"    # daily at 12pm PDT (UTC-7)
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run check-in script
        env:
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          ACCOUNT_MID: ${{ secrets.ACCOUNT_MID }}
          ACCOUNT_TOKEN: ${{ secrets.ACCOUNT_TOKEN }}
          EMAIL: ${{ vars.EMAIL }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          GAME_GI_AID: ${{ vars.GAME_GI_AID }}
          GAME_HSR_AID: ${{ vars.GAME_HSR_AID }}
          GAME_ZZZ_AID: ${{ vars.GAME_ZZZ_AID }}
        run: python main.py
